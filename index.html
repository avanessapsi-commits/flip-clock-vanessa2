<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clock - Cotia</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: 'Inter', sans-serif;
    background: #4D1D2B;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }
  
  .container {
    background: #6B2E42;
    padding: 50px 60px;
    max-width: 1000px;
    width: 100%;
  }
  
  .main-content {
    display: flex;
    align-items: center;
    gap: 60px;
    justify-content: center;
  }
  
  .clock {
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }
  
  .time-box {
    border: none;
    border-radius: 0;
    padding: 0;
    text-align: center;
    background: transparent;
    box-shadow: none;
  }
  
  .number {
    font-size: 76px;
    font-weight: 700;
    color: #F5E6E0;
    line-height: 1;
    letter-spacing: -3px;
    font-variant-numeric: tabular-nums;
  }
  
  .label {
    font-size: 10px;
    color: #D4B5AB;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-top: 8px;
    font-weight: 600;
  }
  
  .separator {
    font-size: 60px;
    color: #F5E6E0;
    font-weight: 700;
    padding-top: 12px;
    line-height: 0.8;
    opacity: 0.7;
  }
  
  .divider {
    width: 1px;
    height: 150px;
    background: #F5E6E0;
    opacity: 0.2;
    margin: 0 50px;
  }
  
  .info {
    display: flex;
    gap: 50px;
    text-align: center;
  }
  
  .info-item {
    padding: 0;
    background: transparent;
    border: none;
    border-radius: 0;
  }
  
  .info-label {
    font-size: 10px;
    color: #D4B5AB;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 12px;
    font-weight: 600;
  }
  
  .info-value {
    font-size: 17px;
    color: #F5E6E0;
    font-weight: 500;
    line-height: 1.5;
  }
  
  .temp-big {
    font-size: 40px;
    color: #F5E6E0;
    font-weight: 700;
  }
  
  .condition-text {
    font-size: 15px;
    color: #E8D4CA;
    font-weight: 400;
  }

  @media (max-width: 768px) {
    .main-content {
      flex-direction: column;
      gap: 40px;
    }
    
    .divider {
      width: 100%;
      height: 1px;
      margin: 0;
    }
    
    .info {
      flex-direction: column;
      gap: 35px;
    }
    
    .container {
      padding: 40px 30px;
    }
  }
</style>
</head>
<body>

<div class="container">
  <div class="main-content">
    <div class="clock">
      <div class="time-box">
        <div class="number" id="horas">00</div>
        <div class="label" id="periodo">AM</div>
      </div>
      <div class="separator">:</div>
      <div class="time-box">
        <div class="number" id="minutos">00</div>
        <div class="label">min</div>
      </div>
    </div>
    
    <div class="divider"></div>
    
    <div class="info">
      <div class="info-item">
        <div class="info-label">Data</div>
        <div class="info-value" id="data">--</div>
      </div>
      <div class="info-item">
        <div class="info-label">Temperatura</div>
        <div class="temp-big" id="temperatura">--°</div>
      </div>
      <div class="info-item">
        <div class="info-label">Condição</div>
        <div class="condition-text" id="condicao">Carregando...</div>
      </div>
    </div>
  </div>
</div>

<script>
function atualizaHora() {
  const agora = new Date();
  const horas = String(agora.getHours()).padStart(2, '0');
  const minutos = String(agora.getMinutes()).padStart(2, '0');
  const periodo = agora.getHours() >= 12 ? 'PM' : 'AM';
  
  document.getElementById('horas').textContent = horas;
  document.getElementById('minutos').textContent = minutos;
  document.getElementById('periodo').textContent = periodo;
}

function atualizaData() {
  const agora = new Date();
  const meses = ['janeiro', 'fevereiro', 'março', 'abril', 'maio', 'junho', 'julho', 'agosto', 'setembro', 'outubro', 'novembro', 'dezembro'];
  const dias = ['domingo', 'segunda', 'terça', 'quarta', 'quinta', 'sexta', 'sábado'];
  
  const dia = dias[agora.getDay()];
  const num = agora.getDate();
  const mes = meses[agora.getMonth()];
  
  document.getElementById('data').textContent = `${dia}\n${num} de ${mes}`;
}

function buscaClima() {
  fetch('https://api.open-meteo.com/v1/forecast?latitude=-23.5606&longitude=-46.7647&current=temperature_2m,weather_code&temperature_unit=celsius')
    .then(r => r.json())
    .then(dados => {
      if (dados.current) {
        const temp = Math.round(dados.current.temperature_2m);
        const codigo = dados.current.weather_code;
        
        document.getElementById('temperatura').textContent = temp + '°';
        
        const condicoes = {
          0: 'Ensolarado',
          1: 'Parcialmente nublado',
          2: 'Nublado',
          3: 'Encoberto',
          45: 'Nebuloso',
          48: 'Nebuloso',
          51: 'Chuvisco',
          61: 'Chuva',
          63: 'Chuva moderada',
          65: 'Chuva forte',
          71: 'Neve',
          80: 'Pancadas',
          95: 'Trovoada'
        };
        
        document.getElementById('condicao').textContent = condicoes[codigo] || 'Consultando';
      }
    })
    .catch(e => {
      document.getElementById('condicao').textContent = 'Indisponível';
    });
}

atualizaHora();
atualizaData();
buscaClima();

setInterval(atualizaHora, 1000);
setInterval(atualizaData, 60000);
setInterval(buscaClima, 600000);
</script>

</body>
</html>
