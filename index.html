<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clock - Cotia</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: 'Inter', sans-serif;
    background: #4D1D2B;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 15px;
  }
  
  .container {
    background: #6B2E42;
    padding: 28px 32px;
    width: 100%;
  }
  
  .main-content {
    display: flex;
    align-items: center;
    gap: 35px;
    justify-content: center;
    flex-wrap: wrap;
  }
  
  .clock {
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }
  
  .time-box {
    border: none;
    border-radius: 0;
    padding: 0;
    text-align: center;
    background: transparent;
    box-shadow: none;
  }
  
  .number {
    font-size: 54px;
    font-weight: 700;
    color: #F5E6E0;
    line-height: 1;
    letter-spacing: -2px;
    font-variant-numeric: tabular-nums;
  }
  
  .label {
    font-size: 9px;
    color: #D4B5AB;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-top: 6px;
    font-weight: 600;
  }
  
  .separator {
    font-size: 44px;
    color: #D47A8C;
    font-weight: 700;
    padding-top: 14px;
    line-height: 0.8;
  }
  
  .divider {
    width: 1px;
    height: 110px;
    background: #D47A8C;
    opacity: 0.3;
    margin: 0 30px;
  }
  
  .info {
    display: flex;
    gap: 25px;
    text-align: center;
  }
  
  .info-item {
    padding: 0;
    background: transparent;
    border: none;
    border-radius: 0;
  }
  
  .info-label {
    font-size: 8px;
    color: #D4B5AB;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    margin-bottom: 6px;
    font-weight: 600;
  }
  
  .info-value {
    font-size: 13px;
    color: #F5E6E0;
    font-weight: 600;
    line-height: 1.4;
  }
  
  .temp-big {
    font-size: 28px;
    color: #F5E6E0;
    font-weight: 700;
  }
  
  .condition-text {
    font-size: 12px;
    color: #E8D4CA;
    font-weight: 400;
  }

  @media (max-width: 600px) {
    .container {
      padding: 20px 20px;
    }
    
    .main-content {
      gap: 25px;
    }
    
    .divider {
      width: 100%;
      height: 1px;
      margin: 0;
    }
    
    .number {
      font-size: 42px;
    }
    
    .separator {
      font-size: 34px;
    }
    
    .info {
      flex-direction: column;
      gap: 20px;
    }
  }
</style>
</head>
<body>

<div class="container">
  <div class="main-content">
    <div class="clock">
      <div class="time-box">
        <div class="number" id="horas">00</div>
        <div class="label" id="periodo">AM</div>
      </div>
      <div class="separator">:</div>
      <div class="time-box">
        <div class="number" id="minutos">00</div>
        <div class="label">min</div>
      </div>
    </div>
    
    <div class="divider"></div>
    
    <div class="info">
      <div class="info-item">
        <div class="info-label">Data</div>
        <div class="info-value" id="data">--</div>
      </div>
      <div class="info-item">
        <div class="info-label">Temp</div>
        <div class="temp-big" id="temperatura">--°</div>
      </div>
      <div class="info-item">
        <div class="info-label">Condição</div>
        <div class="condition-text" id="condicao">--</div>
      </div>
    </div>
  </div>
</div>

<script>
function atualizaHora() {
  const agora = new Date();
  const horas = String(agora.getHours()).padStart(2, '0');
  const minutos = String(agora.getMinutes()).padStart(2, '0');
  const periodo = agora.getHours() >= 12 ? 'PM' : 'AM';
  
  document.getElementById('horas').textContent = horas;
  document.getElementById('minutos').textContent = minutos;
  document.getElementById('periodo').textContent = periodo;
}

function atualizaData() {
  const agora = new Date();
  const meses = ['jan', 'fev', 'mar', 'abr', 'mai', 'jun', 'jul', 'ago', 'set', 'out', 'nov', 'dez'];
  const dias = ['dom', 'seg', 'ter', 'qua', 'qui', 'sex', 'sab'];
  
  const dia = dias[agora.getDay()];
  const num = agora.getDate();
  const mes = meses[agora.getMonth()];
  
  document.getElementById('data').textContent = `${dia}, ${num} ${mes}`;
}

function buscaClima() {
  fetch('https://api.open-meteo.com/v1/forecast?latitude=-23.5606&longitude=-46.7647&current=temperature_2m,weather_code&temperature_unit=celsius')
    .then(r => r.json())
    .then(dados => {
      if (dados.current) {
        const temp = Math.round(dados.current.temperature_2m);
        const codigo = dados.current.weather_code;
        
        document.getElementById('temperatura').textContent = temp + '°';
        
        const condicoes = {
          0: 'Ensolarado',
          1: 'P. nublado',
          2: 'Nublado',
          3: 'Encoberto',
          45: 'Nebuloso',
          48: 'Nebuloso',
          51: 'Chuvisco',
          61: 'Chuva',
          63: 'Chuva mod.',
          65: 'Chuva forte',
          71: 'Neve',
          80: 'Pancadas',
          95: 'Trovoada'
        };
        
        document.getElementById('condicao').textContent = condicoes[codigo] || '--';
      }
    })
    .catch(e => {
      document.getElementById('condicao').textContent = '--';
    });
}

atualizaHora();
atualizaData();
buscaClima();

setInterval(atualizaHora, 1000);
setInterval(atualizaData, 60000);
setInterval(buscaClima, 600000);
</script>

</body>
</html>
