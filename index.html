<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clock - Cotia</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  html, body {
    height: 100%;
  }
  
  body {
    font-family: 'Inter', sans-serif;
    background: #4D1D2B;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 12px;
  }
  
  .container {
    background: #6B2E42;
    padding: 24px;
    width: 100%;
    height: auto;
    max-width: 95vw;
    max-height: 95vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  .main-content {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 28px;
    width: 100%;
    height: auto;
  }
  
  .clock {
    display: flex;
    gap: 6px;
    align-items: flex-start;
    flex-shrink: 0;
  }
  
  .time-box {
    border: none;
    border-radius: 0;
    padding: 0;
    text-align: center;
    background: transparent;
    box-shadow: none;
  }
  
  .number {
    font-size: clamp(36px, 10vw, 56px);
    font-weight: 700;
    color: #F5E6E0;
    line-height: 1;
    letter-spacing: -2px;
    font-variant-numeric: tabular-nums;
  }
  
  .label {
    font-size: clamp(7px, 2vw, 9px);
    color: #D4B5AB;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    margin-top: 4px;
    font-weight: 600;
  }
  
  .separator {
    font-size: clamp(32px, 8vw, 44px);
    color: #D47A8C;
    font-weight: 700;
    padding-top: clamp(8px, 2vw, 12px);
    line-height: 0.8;
    flex-shrink: 0;
  }
  
  .divider {
    flex-shrink: 0;
  }
  
  .divider.vertical {
    width: 1px;
    height: clamp(80px, 20vh, 120px);
    background: #D47A8C;
    opacity: 0.3;
    margin: 0 24px;
  }
  
  .divider.horizontal {
    width: 100%;
    height: 1px;
    background: #D47A8C;
    opacity: 0.3;
    margin: 16px 0;
    display: none;
  }
  
  .info {
    display: flex;
    gap: 20px;
    text-align: center;
    justify-content: center;
    flex-wrap: wrap;
  }
  
  .info-item {
    padding: 0;
    background: transparent;
    border: none;
    border-radius: 0;
    flex: 0 1 auto;
    min-width: fit-content;
  }
  
  .info-label {
    font-size: clamp(7px, 2vw, 9px);
    color: #D4B5AB;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
    font-weight: 600;
  }
  
  .info-value {
    font-size: clamp(11px, 2.5vw, 14px);
    color: #F5E6E0;
    font-weight: 600;
    line-height: 1.3;
  }
  
  .temp-big {
    font-size: clamp(20px, 5vw, 28px);
    color: #F5E6E0;
    font-weight: 700;
  }
  
  .condition-text {
    font-size: clamp(10px, 2vw, 12px);
    color: #E8D4CA;
    font-weight: 400;
  }

  /* LAYOUT HORIZONTAL (padrão) */
  @media (min-aspect-ratio: 1.2/1) {
    .main-content {
      flex-direction: row;
    }
    
    .divider.vertical {
      display: block;
    }
    
    .divider.horizontal {
      display: none;
    }
    
    .info {
      flex-direction: row;
      gap: 28px;
    }
  }

  /* LAYOUT VERTICAL */
  @media (max-aspect-ratio: 1.2/1) {
    .container {
      padding: 20px;
    }
    
    .main-content {
      flex-direction: column;
      gap: 16px;
    }
    
    .divider.vertical {
      display: none;
    }
    
    .divider.horizontal {
      display: block;
    }
    
    .info {
      flex-direction: row;
      gap: 16px;
      justify-content: center;
    }
  }

  /* TELAS MUITO PEQUENAS */
  @media (max-width: 400px) {
    .container {
      padding: 16px;
    }
    
    .number {
      font-size: 32px;
    }
    
    .separator {
      font-size: 28px;
    }
    
    .info-item {
      flex: 0 1 auto;
    }
  }
</style>
</head>
<body>

<div class="container">
  <div class="main-content">
    <div class="clock">
      <div class="time-box">
        <div class="number" id="horas">00</div>
        <div class="label" id="periodo">AM</div>
      </div>
      <div class="separator">:</div>
      <div class="time-box">
        <div class="number" id="minutos">00</div>
        <div class="label">min</div>
      </div>
    </div>
    
    <div class="divider vertical"></div>
    <div class="divider horizontal"></div>
    
    <div class="info">
      <div class="info-item">
        <div class="info-label">Data</div>
        <div class="info-value" id="data">--</div>
      </div>
      <div class="info-item">
        <div class="info-label">Temp</div>
        <div class="temp-big" id="temperatura">--°</div>
      </div>
      <div class="info-item">
        <div class="info-label">Condição</div>
        <div class="condition-text" id="condicao">--</div>
      </div>
    </div>
  </div>
</div>

<script>
function atualizaHora() {
  const agora = new Date();
  const horas = String(agora.getHours()).padStart(2, '0');
  const minutos = String(agora.getMinutes()).padStart(2, '0');
  const periodo = agora.getHours() >= 12 ? 'PM' : 'AM';
  
  document.getElementById('horas').textContent = horas;
  document.getElementById('minutos').textContent = minutos;
  document.getElementById('periodo').textContent = periodo;
}

function atualizaData() {
  const agora = new Date();
  const meses = ['jan', 'fev', 'mar', 'abr', 'mai', 'jun', 'jul', 'ago', 'set', 'out', 'nov', 'dez'];
  const dias = ['dom', 'seg', 'ter', 'qua', 'qui', 'sex', 'sab'];
  
  const dia = dias[agora.getDay()];
  const num = agora.getDate();
  const mes = meses[agora.getMonth()];
  
  document.getElementById('data').textContent = `${dia}, ${num} ${mes}`;
}

function buscaClima() {
  fetch('https://api.open-meteo.com/v1/forecast?latitude=-23.5606&longitude=-46.7647&current=temperature_2m,weather_code&temperature_unit=celsius')
    .then(r => r.json())
    .then(dados => {
      if (dados.current) {
        const temp = Math.round(dados.current.temperature_2m);
        const codigo = dados.current.weather_code;
        
        document.getElementById('temperatura').textContent = temp + '°';
        
        const condicoes = {
          0: 'Ensolarado',
          1: 'P. nublado',
          2: 'Nublado',
          3: 'Encoberto',
          45: 'Nebuloso',
          48: 'Nebuloso',
          51: 'Chuvisco',
          61: 'Chuva',
          63: 'Chuva mod.',
          65: 'Chuva forte',
          71: 'Neve',
          80: 'Pancadas',
          95: 'Trovoada'
        };
        
        document.getElementById('condicao').textContent = condicoes[codigo] || '--';
      }
    })
    .catch(e => {
      document.getElementById('condicao').textContent = '--';
    });
}

atualizaHora();
atualizaData();
buscaClima();

setInterval(atualizaHora, 1000);
setInterval(atualizaData, 60000);
setInterval(buscaClima, 600000);
</script>

</body>
</html>
